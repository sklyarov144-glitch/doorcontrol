name: Deploy production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY to confirm production release
        required: true
      release_sha:
        description: Full commit SHA of the successful staging release
        required: true

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    if: inputs.confirmation == 'DEPLOY'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      RELEASE_SHA: ${{ inputs.release_sha }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      APP_ALLOWED_ORIGINS: ${{ vars.APP_ALLOWED_ORIGINS }}
      APP_PUBLIC_URL: ${{ vars.APP_PUBLIC_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Require successful staging release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/verify-release-provenance.mjs
          git fetch --no-tags origin "$RELEASE_SHA"
          git checkout --detach "$RELEASE_SHA"
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
      - run: npm ci
      - run: npm run ci
      - name: Validate production configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          missing=()
          [[ -z "$SUPABASE_ACCESS_TOKEN" ]] && missing+=(SUPABASE_ACCESS_TOKEN)
          [[ -z "$SUPABASE_PROJECT_ID" ]] && missing+=(SUPABASE_PROJECT_ID)
          [[ -z "$APP_ALLOWED_ORIGINS" ]] && missing+=(APP_ALLOWED_ORIGINS)
          [[ -z "$APP_PUBLIC_URL" ]] && missing+=(APP_PUBLIC_URL)
          [[ -z "$VERCEL_TOKEN" ]] && missing+=(VERCEL_TOKEN)
          [[ -z "$VERCEL_ORG_ID" ]] && missing+=(VERCEL_ORG_ID)
          [[ -z "$VERCEL_PROJECT_ID" ]] && missing+=(VERCEL_PROJECT_ID)
          [[ -z "$VITE_SUPABASE_URL" ]] && missing+=(VITE_SUPABASE_URL)
          [[ -z "$VITE_SUPABASE_ANON_KEY" ]] && missing+=(VITE_SUPABASE_ANON_KEY)
          [[ -z "$VITE_SENTRY_DSN" ]] && missing+=(VITE_SENTRY_DSN)
          if (( ${#missing[@]} )); then
            echo "::error::Production deployment is not configured. Missing secrets/variables: ${missing[*]}"
            exit 1
          fi
      - name: Apply database migrations
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOY_ENV: production
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run verify:deployment && npm run verify:env && npx supabase link --project-ref "$SUPABASE_PROJECT_ID" && npx supabase db push --linked
      - name: Deploy Edge Functions
        run: |
          test -n "$APP_ALLOWED_ORIGINS"
          npx supabase secrets set APP_ALLOWED_ORIGINS="$APP_ALLOWED_ORIGINS" APP_PUBLIC_URL="$APP_PUBLIC_URL" --project-ref "$SUPABASE_PROJECT_ID"
          npx supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
      - name: Smoke test backend health
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run health:smoke
      - name: Build and deploy Vercel production
        env:
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_URL: ${{ vars.APP_PUBLIC_URL }}
          VITE_APP_RELEASE: ${{ env.RELEASE_SHA }}
        run: |
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          npm run verify:bundle -- .vercel/output/static
          DEPLOY_URL=$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
      - name: Smoke test
        run: SMOKE_URL="$DEPLOY_URL" SMOKE_REQUIRE_SECURITY_HEADERS=true npm run smoke
      - name: Smoke test canonical production domain
        run: SMOKE_URL="$APP_PUBLIC_URL" SMOKE_REQUIRE_SECURITY_HEADERS=true npm run smoke
      - name: Create release evidence
        run: node scripts/create-release-evidence.mjs release-evidence.json
      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-release-${{ env.RELEASE_SHA }}
          path: release-evidence.json
          retention-days: 90
          if-no-files-found: error
