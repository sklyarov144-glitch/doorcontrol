name: Deploy production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY to confirm production release
        required: true
      release_sha:
        description: Full commit SHA of the successful staging release
        required: true

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    if: inputs.confirmation == 'DEPLOY'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      RELEASE_SHA: ${{ inputs.release_sha }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      APP_ALLOWED_ORIGINS: ${{ vars.APP_ALLOWED_ORIGINS }}
      APP_PUBLIC_URL: ${{ vars.APP_PUBLIC_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      AUTH_SMOKE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      AUTH_SMOKE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      AUTH_SMOKE_CREATOR_EMAIL: ${{ secrets.AUTH_SMOKE_CREATOR_EMAIL }}
      AUTH_SMOKE_CREATOR_PASSWORD: ${{ secrets.AUTH_SMOKE_CREATOR_PASSWORD }}
      AUTH_SMOKE_COMPANY_HEAD_EMAIL: ${{ secrets.AUTH_SMOKE_COMPANY_HEAD_EMAIL }}
      AUTH_SMOKE_COMPANY_HEAD_PASSWORD: ${{ secrets.AUTH_SMOKE_COMPANY_HEAD_PASSWORD }}
      AUTH_SMOKE_CONSTRUCTION_DIRECTOR_EMAIL: ${{ secrets.AUTH_SMOKE_CONSTRUCTION_DIRECTOR_EMAIL }}
      AUTH_SMOKE_CONSTRUCTION_DIRECTOR_PASSWORD: ${{ secrets.AUTH_SMOKE_CONSTRUCTION_DIRECTOR_PASSWORD }}
      AUTH_SMOKE_CREATOR_TOTP_SECRET: ${{ secrets.AUTH_SMOKE_CREATOR_TOTP_SECRET }}
      AUTH_SMOKE_COMPANY_HEAD_TOTP_SECRET: ${{ secrets.AUTH_SMOKE_COMPANY_HEAD_TOTP_SECRET }}
      AUTH_SMOKE_CONSTRUCTION_DIRECTOR_TOTP_SECRET: ${{ secrets.AUTH_SMOKE_CONSTRUCTION_DIRECTOR_TOTP_SECRET }}
      AUTH_SMOKE_ITR_EMAIL: ${{ secrets.AUTH_SMOKE_ITR_EMAIL }}
      AUTH_SMOKE_ITR_PASSWORD: ${{ secrets.AUTH_SMOKE_ITR_PASSWORD }}
      UAT_EVIDENCE_JSON: ${{ secrets.UAT_EVIDENCE_JSON }}
      PILOT_RECONCILIATION_EVIDENCE_JSON: ${{ secrets.PILOT_RECONCILIATION_EVIDENCE_JSON }}
      RESTORE_EVIDENCE_JSON: ${{ secrets.RESTORE_EVIDENCE_JSON }}
      PRODUCTION_HANDOFF_JSON: ${{ secrets.PRODUCTION_HANDOFF_JSON }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Require successful staging release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/verify-release-provenance.mjs
          git fetch --no-tags origin "$RELEASE_SHA"
          git checkout --detach "$RELEASE_SHA"
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"
      - run: npm ci
      - name: Download and verify immutable staging evidence
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          evidence_dir="$(mktemp -d)"
          trap 'rm -rf "$evidence_dir"' EXIT
          gh run download "$STAGING_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "staging-release-$RELEASE_SHA" --dir "$evidence_dir"
          node scripts/verify-staging-release-evidence.mjs "$evidence_dir/staging-release-evidence.json"
      - run: npm run ci
      - name: Verify production readiness evidence
        env:
          EXPECTED_RELEASE_SHA: ${{ env.RELEASE_SHA }}
        run: |
          test -n "$UAT_EVIDENCE_JSON" || { echo "::error::UAT_EVIDENCE_JSON is required"; exit 1; }
          test -n "$PILOT_RECONCILIATION_EVIDENCE_JSON" || { echo "::error::PILOT_RECONCILIATION_EVIDENCE_JSON is required"; exit 1; }
          test -n "$RESTORE_EVIDENCE_JSON" || { echo "::error::RESTORE_EVIDENCE_JSON is required"; exit 1; }
          test -n "$PRODUCTION_HANDOFF_JSON" || { echo "::error::PRODUCTION_HANDOFF_JSON is required"; exit 1; }
          umask 077
          trap 'rm -f /tmp/uat-evidence.json /tmp/pilot-reconciliation-evidence.json /tmp/restore-evidence.json /tmp/production-handoff.json' EXIT
          printf '%s' "$UAT_EVIDENCE_JSON" > /tmp/uat-evidence.json
          printf '%s' "$PILOT_RECONCILIATION_EVIDENCE_JSON" > /tmp/pilot-reconciliation-evidence.json
          printf '%s' "$RESTORE_EVIDENCE_JSON" > /tmp/restore-evidence.json
          printf '%s' "$PRODUCTION_HANDOFF_JSON" > /tmp/production-handoff.json
          UAT_EVIDENCE_PATH=/tmp/uat-evidence.json \
          PILOT_RECONCILIATION_EVIDENCE_PATH=/tmp/pilot-reconciliation-evidence.json \
          RESTORE_EVIDENCE_PATH=/tmp/restore-evidence.json \
          PRODUCTION_HANDOFF_PATH=/tmp/production-handoff.json \
          EXPECTED_PRODUCTION_URL="$APP_PUBLIC_URL" \
          EXPECTED_GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
          npm run pilot:production-readiness
      - name: Validate production configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: |
          missing=()
          [[ -z "$SUPABASE_ACCESS_TOKEN" ]] && missing+=(SUPABASE_ACCESS_TOKEN)
          [[ -z "$SUPABASE_PROJECT_ID" ]] && missing+=(SUPABASE_PROJECT_ID)
          [[ -z "$APP_ALLOWED_ORIGINS" ]] && missing+=(APP_ALLOWED_ORIGINS)
          [[ -z "$APP_PUBLIC_URL" ]] && missing+=(APP_PUBLIC_URL)
          [[ -z "$VERCEL_TOKEN" ]] && missing+=(VERCEL_TOKEN)
          [[ -z "$VERCEL_ORG_ID" ]] && missing+=(VERCEL_ORG_ID)
          [[ -z "$VERCEL_PROJECT_ID" ]] && missing+=(VERCEL_PROJECT_ID)
          [[ -z "$VITE_SUPABASE_URL" ]] && missing+=(VITE_SUPABASE_URL)
          [[ -z "$VITE_SUPABASE_ANON_KEY" ]] && missing+=(VITE_SUPABASE_ANON_KEY)
          [[ -z "$VITE_SENTRY_DSN" ]] && missing+=(VITE_SENTRY_DSN)
          [[ -z "$UAT_EVIDENCE_JSON" ]] && missing+=(UAT_EVIDENCE_JSON)
          [[ -z "$PILOT_RECONCILIATION_EVIDENCE_JSON" ]] && missing+=(PILOT_RECONCILIATION_EVIDENCE_JSON)
          [[ -z "$RESTORE_EVIDENCE_JSON" ]] && missing+=(RESTORE_EVIDENCE_JSON)
          [[ -z "$PRODUCTION_HANDOFF_JSON" ]] && missing+=(PRODUCTION_HANDOFF_JSON)
          required_auth=(AUTH_SMOKE_SUPABASE_URL AUTH_SMOKE_SUPABASE_ANON_KEY AUTH_SMOKE_CREATOR_EMAIL AUTH_SMOKE_CREATOR_PASSWORD AUTH_SMOKE_CREATOR_TOTP_SECRET AUTH_SMOKE_COMPANY_HEAD_EMAIL AUTH_SMOKE_COMPANY_HEAD_PASSWORD AUTH_SMOKE_COMPANY_HEAD_TOTP_SECRET AUTH_SMOKE_CONSTRUCTION_DIRECTOR_EMAIL AUTH_SMOKE_CONSTRUCTION_DIRECTOR_PASSWORD AUTH_SMOKE_CONSTRUCTION_DIRECTOR_TOTP_SECRET AUTH_SMOKE_ITR_EMAIL AUTH_SMOKE_ITR_PASSWORD)
          for name in "${required_auth[@]}"; do [[ -z "${!name}" ]] && missing+=("$name"); done
          if (( ${#missing[@]} )); then
            echo "::error::Production deployment is not configured. Missing secrets/variables: ${missing[*]}"
            exit 1
          fi
      - name: Apply database migrations
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOY_ENV: production
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_REQUIRE_PRIVILEGED_MFA: "true"
        run: npm run verify:deployment && npm run verify:env && npx supabase link --project-ref "$SUPABASE_PROJECT_ID" && npx supabase db push --linked
      - name: Configure and verify hosted Auth
        run: npm run supabase:auth:configure
      - name: Deploy Edge Functions
        run: |
          test -n "$APP_ALLOWED_ORIGINS"
          npx supabase secrets set APP_ALLOWED_ORIGINS="$APP_ALLOWED_ORIGINS" APP_PUBLIC_URL="$APP_PUBLIC_URL" --project-ref "$SUPABASE_PROJECT_ID"
          npx supabase functions deploy --use-api --project-ref "$SUPABASE_PROJECT_ID"
      - name: Smoke test backend health
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run health:smoke
      - name: Build and deploy Vercel production
        env:
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_URL: ${{ vars.APP_PUBLIC_URL }}
          VITE_APP_RELEASE: ${{ env.RELEASE_SHA }}
          VITE_REQUIRE_PRIVILEGED_MFA: "true"
        run: |
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          npm run verify:bundle -- .vercel/output/static
          DEPLOY_URL=$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
      - name: Smoke test
        run: SMOKE_URL="$APP_PUBLIC_URL" SMOKE_EXPECT_RELEASE="$RELEASE_SHA" SMOKE_RETRIES=12 SMOKE_REQUIRE_SECURITY_HEADERS=true npm run smoke
      - name: Smoke test Sentry ingestion
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: ${{ env.RELEASE_SHA }}
          SENTRY_EVIDENCE_PATH: sentry-smoke-evidence.json
        run: npm run monitoring:smoke
      - name: Upload Sentry smoke evidence
        uses: actions/upload-artifact@v7
        with:
          name: production-sentry-smoke-${{ env.RELEASE_SHA }}
          path: sentry-smoke-evidence.json
          retention-days: 90
          if-no-files-found: error
      - name: Smoke test four authenticated production roles
        env:
          AUTH_SMOKE_REQUIRE_MFA: "1"
        run: npm run auth:smoke
      - name: Install browser for published UI smoke
        run: npx playwright install --with-deps chromium
      - name: Smoke test four production roles through published UI
        env:
          REMOTE_AUTH_SMOKE: "1"
          AUTH_SMOKE_REQUIRE_MFA: "1"
          PLAYWRIGHT_BASE_URL: ${{ vars.APP_PUBLIC_URL }}
        run: npm run auth:ui-smoke
      - name: Load smoke authenticated production ITR domain
        run: npm run load:domain
      - name: Create release evidence
        run: node scripts/create-release-evidence.mjs release-evidence.json
      - name: Upload release evidence
        uses: actions/upload-artifact@v7
        with:
          name: production-release-${{ env.RELEASE_SHA }}
          path: release-evidence.json
          retention-days: 90
          if-no-files-found: error
