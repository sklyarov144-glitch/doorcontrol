name: Deploy staging

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run ci
      - name: Apply database migrations
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_ID" && npx supabase db push --linked
      - name: Deploy Edge Functions
        run: npx supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
      - name: Build and deploy Vercel staging
        run: |
          npx vercel pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --token="${{ secrets.VERCEL_TOKEN }}"
          DEPLOY_URL=$(npx vercel deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}")
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
      - name: Smoke test
        run: SMOKE_URL="$DEPLOY_URL" npm run smoke
