name: Deploy staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

concurrency:
  group: staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: staging
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      APP_ALLOWED_ORIGINS: ${{ vars.APP_ALLOWED_ORIGINS }}
      APP_PUBLIC_URL: ${{ vars.APP_PUBLIC_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      AUTH_SMOKE_SUPABASE_URL: ${{ secrets.AUTH_SMOKE_SUPABASE_URL }}
      AUTH_SMOKE_SUPABASE_ANON_KEY: ${{ secrets.AUTH_SMOKE_SUPABASE_ANON_KEY }}
      AUTH_SMOKE_CREATOR_EMAIL: ${{ secrets.AUTH_SMOKE_CREATOR_EMAIL }}
      AUTH_SMOKE_CREATOR_PASSWORD: ${{ secrets.AUTH_SMOKE_CREATOR_PASSWORD }}
      AUTH_SMOKE_COMPANY_HEAD_EMAIL: ${{ secrets.AUTH_SMOKE_COMPANY_HEAD_EMAIL }}
      AUTH_SMOKE_COMPANY_HEAD_PASSWORD: ${{ secrets.AUTH_SMOKE_COMPANY_HEAD_PASSWORD }}
      AUTH_SMOKE_CONSTRUCTION_DIRECTOR_EMAIL: ${{ secrets.AUTH_SMOKE_CONSTRUCTION_DIRECTOR_EMAIL }}
      AUTH_SMOKE_CONSTRUCTION_DIRECTOR_PASSWORD: ${{ secrets.AUTH_SMOKE_CONSTRUCTION_DIRECTOR_PASSWORD }}
      AUTH_SMOKE_ITR_EMAIL: ${{ secrets.AUTH_SMOKE_ITR_EMAIL }}
      AUTH_SMOKE_ITR_PASSWORD: ${{ secrets.AUTH_SMOKE_ITR_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_SHA }}
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run ci
      - name: Validate deployment configuration
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DEPLOY_ENV: staging
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run verify:deployment && npm run verify:env
      - name: Apply database migrations
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_ID" && npx supabase db push --linked
      - name: Configure and verify hosted Auth
        run: npm run supabase:auth:configure
      - name: Deploy Edge Functions
        run: |
          if [[ -n "$APP_ALLOWED_ORIGINS" ]]; then npx supabase secrets set APP_ALLOWED_ORIGINS="$APP_ALLOWED_ORIGINS" APP_PUBLIC_URL="$APP_PUBLIC_URL" --project-ref "$SUPABASE_PROJECT_ID"; fi
          npx supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
      - name: Smoke test backend health
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run health:smoke
      - name: Build and deploy Vercel staging
        env:
          VITE_DATA_PROVIDER: supabase
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_APP_URL: ${{ vars.APP_PUBLIC_URL }}
          VITE_APP_RELEASE: ${{ env.RELEASE_SHA }}
        run: |
          npx vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          npm run verify:bundle -- .vercel/output/static
          DEPLOY_URL=$(npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")
          echo "DEPLOY_URL=$DEPLOY_URL" >> "$GITHUB_ENV"
      - name: Smoke test
        run: SMOKE_URL="$APP_PUBLIC_URL" SMOKE_EXPECT_RELEASE="$RELEASE_SHA" SMOKE_RETRIES=12 SMOKE_REQUIRE_SECURITY_HEADERS=true npm run smoke
      - name: Check auth smoke configuration
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          required=(AUTH_SMOKE_SUPABASE_URL AUTH_SMOKE_SUPABASE_ANON_KEY AUTH_SMOKE_CREATOR_EMAIL AUTH_SMOKE_CREATOR_PASSWORD AUTH_SMOKE_COMPANY_HEAD_EMAIL AUTH_SMOKE_COMPANY_HEAD_PASSWORD AUTH_SMOKE_CONSTRUCTION_DIRECTOR_EMAIL AUTH_SMOKE_CONSTRUCTION_DIRECTOR_PASSWORD AUTH_SMOKE_ITR_EMAIL AUTH_SMOKE_ITR_PASSWORD)
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "::error::Auth role smoke is required for staging: $name is not configured."
              exit 1
            fi
          done
          [[ "$AUTH_SMOKE_SUPABASE_URL" = "$VITE_SUPABASE_URL" ]] || { echo "::error::Auth smoke URL does not match deployed Supabase project."; exit 1; }
          [[ "$AUTH_SMOKE_SUPABASE_ANON_KEY" = "$VITE_SUPABASE_ANON_KEY" ]] || { echo "::error::Auth smoke anon key does not match deployed Supabase project."; exit 1; }
      - name: Smoke test four authenticated roles
        run: npm run auth:smoke
      - name: Load smoke authenticated ITR domain
        run: npm run load:domain
