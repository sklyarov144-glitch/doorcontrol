name: Encrypted production database backup

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production-backup
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Install PostgreSQL client
        run: sudo rm -f /etc/apt/sources.list.d/google-chrome.list /etc/apt/sources.list.d/google-chrome.sources && sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
      - name: Validate backup secrets
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
          BACKUP_SUPABASE_URL: ${{ secrets.BACKUP_SUPABASE_URL }}
          BACKUP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.BACKUP_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          missing=()
          [[ -z "$SUPABASE_DB_URL" ]] && missing+=(SUPABASE_DB_URL)
          [[ -z "$BACKUP_ENCRYPTION_PASSWORD" ]] && missing+=(BACKUP_ENCRYPTION_PASSWORD)
          [[ -z "$BACKUP_SUPABASE_URL" ]] && missing+=(BACKUP_SUPABASE_URL)
          [[ -z "$BACKUP_SUPABASE_SERVICE_ROLE_KEY" ]] && missing+=(BACKUP_SUPABASE_SERVICE_ROLE_KEY)
          if (( ${#missing[@]} )); then
            echo "::error::Production backup is not configured. Missing environment secrets: ${missing[*]}"
            exit 1
          fi
      - name: Export database roles, schema and data
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup
          npx supabase db dump --db-url "$SUPABASE_DB_URL" --role-only --file backup/roles.sql
          # Supabase role dumps may include instance-level settings unavailable in the restore container.
          perl -0pi -e 's/ALTER (?:ROLE|DATABASE)\b.*?;\s*//gs; s/^SET\b.*?;\s*//mg; s/SELECT\s+pg_catalog\.set_config\([^;]*\);\s*//gs' backup/roles.sql
          npx supabase db dump --db-url "$SUPABASE_DB_URL" --file backup/schema.sql
          npx supabase db dump --db-url "$SUPABASE_DB_URL" --data-only --use-copy --file backup/data.sql
          perl -0pi -e 's/^COPY\s+(?:"?storage"?\.)?"?buckets_vectors"?\b[^\n]*\n.*?\n\\.\n//gms' backup/data.sql
          perl -0pi -e 's/COPY\s+storage\.buckets_vectors\b.*?\n\\.\n//gs' backup/data.sql
          psql "$SUPABASE_DB_URL" --set ON_ERROR_STOP=1 --no-align --tuples-only --command "
            select json_build_object(
              'companies', (select count(*) from public.companies),
              'profiles', (select count(*) from public.profiles),
              'objects', (select count(*) from public.objects),
              'buildings', (select count(*) from public.buildings),
              'floors', (select count(*) from public.floors),
              'doors', (select count(*) from public.doors),
              'tasks', (select count(*) from public.tasks),
              'documents', (select count(*) from public.document_items),
              'storageObjects', (select count(*) from storage.objects where bucket_id in ('documents', 'floor-plans', 'avatars'))
            );" > backup/source-counts.json
      - name: Export private Storage buckets
        env:
          BACKUP_SUPABASE_URL: ${{ secrets.BACKUP_SUPABASE_URL }}
          BACKUP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.BACKUP_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/backup/export-storage.mjs backup/storage backup/storage-manifest.json
          tar -czf backup/storage.tar.gz -C backup storage storage-manifest.json
          node scripts/backup/create-manifest.mjs backup/manifest.json backup/roles.sql backup/schema.sql backup/data.sql backup/storage.tar.gz backup/source-counts.json
          tar -czf gross-production.tar.gz -C backup roles.sql schema.sql data.sql storage.tar.gz source-counts.json manifest.json
      - name: Encrypt backup
        env:
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          BACKUP_FILE="gross-production-$(date -u +%F).tar.gz.enc"
          openssl enc -aes-256-cbc -salt -pbkdf2 -in gross-production.tar.gz -out "$BACKUP_FILE" -pass env:BACKUP_ENCRYPTION_PASSWORD
          sha256sum "$BACKUP_FILE" > "$BACKUP_FILE.sha256"
          rm gross-production.tar.gz
      - name: Verify encrypted backup can be decrypted
        env:
          BACKUP_ENCRYPTION_PASSWORD: ${{ secrets.BACKUP_ENCRYPTION_PASSWORD }}
        run: |
          BACKUP_FILE=$(find . -maxdepth 1 -name 'gross-production-*.tar.gz.enc' -print -quit)
          test -n "$BACKUP_FILE"
          sha256sum --check "$BACKUP_FILE.sha256"
          mkdir -p restore-check
          openssl enc -d -aes-256-cbc -pbkdf2 -in "$BACKUP_FILE" -out restore-check/backup.tar.gz -pass env:BACKUP_ENCRYPTION_PASSWORD
          tar -xzf restore-check/backup.tar.gz -C restore-check
          node scripts/backup/verify-manifest.mjs restore-check/manifest.json restore-check
          mkdir -p restore-check/storage-check
          tar -xzf restore-check/storage.tar.gz -C restore-check/storage-check
          node scripts/backup/verify-storage-export.mjs restore-check/storage-check/storage-manifest.json restore-check/storage-check/storage
          grep -Eq 'COPY |INSERT INTO' restore-check/data.sql
          rm -rf restore-check backup
      - uses: actions/upload-artifact@v7
        with:
          name: gross-db-backup-${{ github.run_id }}
          path: |
            *.tar.gz.enc
            *.tar.gz.enc.sha256
          retention-days: 14
          if-no-files-found: error
